name: Release

on:
  push:
    # Only run on version tags (e.g. v0.1.0, v1.2.3-beta).
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard - no banned HTML sinks
        run: npm run check:naming

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: E2E tests (real browser, no wallet)
        run: npm run test:e2e

      - name: Package distribution
        run: zip -r "quantumswap-web-app-${{ github.ref_name }}.zip" dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantumswap-web-app-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.ref_name }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "quantumswap-web-app-${{ github.ref_name }}.zip"
